<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPD Text Overlay</title>
    <style>
        body {
            background-color: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
            text-shadow: 2px 2px 2px #000;
        }

        /* Custom Scrollbar for OBS */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        pre {
            margin: 0;
            font-size: 1.2rem;
            line-height: 1.2;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <pre id="summary">Loading game summary...</pre>

    <script>
        async function updateSummary() {
            try {
                // Fetch the text file directly
                const response = await fetch('/game_summary.txt?t=' + new Date().getTime());
                if (response.ok) {
                    const text = await response.text();
                    document.getElementById('summary').textContent = text;
                }
            } catch (error) {
                console.error('Error fetching summary:', error);
            }
        }

        // Update every 5 seconds (reduces console spam)
        setInterval(updateSummary, 5000);
        updateSummary();
    </script>
</body>

</html>
